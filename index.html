<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <!-- 修正 GitHub Pages 等環境：網址若為 /repo 而無結尾 /，相對路徑 assets/… 會請求錯誤位置 -->
    <base href="./" />
    <script>
      (function () {
        var p = location.pathname.replace(/\/index\.html?$/i, "");
        if (!p.endsWith("/")) {
          p += "/";
        }
        document.querySelector("base").setAttribute("href", p || "/");
      })();
    </script>
    <title>拯救康貝特大作戰</title>
    <link rel="stylesheet" href="style.css?v=20260511-bluebull-mogua" />
    <!-- Boss 去背圖：預載避免首幀 drawImage 尚未 decode -->
    <link rel="preload" as="image" href="assets/marketing/紅牛去背.png" />
    <link rel="preload" as="image" href="assets/marketing/魔爪去背.png" />
  </head>
  <body>
    <main class="page">
      <section class="game-shell">
        <canvas id="game" width="960" height="540" aria-label="提神宇宙康貝特200p逆襲遊戲"></canvas>
        <div
          id="touchControls"
          class="touch-controls"
          aria-hidden="true"
        >
          <div class="touch-controls__cluster touch-controls__cluster--move">
            <button type="button" class="touch-pad touch-pad--dir" data-touch="left" aria-label="向左移動">
              ◀
            </button>
            <button type="button" class="touch-pad touch-pad--dir" data-touch="right" aria-label="向右移動">
              ▶
            </button>
          </div>
          <div class="touch-controls__cluster touch-controls__cluster--action">
            <button type="button" class="touch-pad touch-pad--dash" data-touch="dash" aria-label="衝刺">
              衝
            </button>
            <button type="button" class="touch-pad touch-pad--jump" data-touch="jump" aria-label="跳躍">
              跳
            </button>
          </div>
        </div>
        <div id="cutsceneVideoOverlay" class="video-overlay" aria-hidden="true">
          <div class="video-overlay__stage">
            <video
              id="cutsceneVideo"
              class="video-overlay__player"
              playsinline
              preload="auto"
              src="assets/marketing/inserted-video.mp4"
            ></video>
          </div>
          <div id="cutsceneVideoHint" class="video-overlay__hint">影片自動播放中…</div>
        </div>
      </section>

      <div class="ui-hidden" aria-hidden="true">
        <span id="statusPill">點一下進入提神宇宙</span>
        <span id="coinsPill">200P 0 / 0</span>
        <span id="livesPill">精神值 5</span>
        <span id="timerPill">剩餘時間 78秒</span>
        <button id="restartButton" type="button">重開逆襲</button>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        function blockGesture(e) {
          e.preventDefault();
        }
        document.addEventListener("gesturestart", blockGesture, { passive: false });
        document.addEventListener("gesturechange", blockGesture, { passive: false });
        document.addEventListener("gestureend", blockGesture, { passive: false });

        var shell = document.querySelector(".game-shell");
        if (shell) {
          var lastTouchEnd = 0;
          shell.addEventListener(
            "touchend",
            function (e) {
              var now = Date.now();
              if (now - lastTouchEnd < 400) {
                e.preventDefault();
              }
              lastTouchEnd = now;
            },
            { passive: false }
          );
        }
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <!-- 拆分後依序載入，保持同一個 global scope；維護說明見 game/README.md -->
    <script src="game/split/part-01.core.js?v=20260512-ad-footer-lines"></script>
    <script src="game/split/part-02.stage.js?v=20260512-ad-footer-lines"></script>
    <script src="game/split/part-03.render-loop.js?v=20260512-ad-footer-lines"></script>
    <script src="game/split/part-04.input-boot.js?v=20260512-ad-footer-lines"></script>
  </body>
</html>
