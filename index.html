<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <!-- 修正 GitHub Pages 等環境：網址若為 /repo 而無結尾 /，相對路徑 assets/… 會請求錯誤位置 -->
    <base href="./" />
    <script>
      (function () {
        var p = location.pathname.replace(/\/index\.html?$/i, "");
        if (!p.endsWith("/")) {
          p += "/";
        }
        document.querySelector("base").setAttribute("href", p || "/");
      })();
    </script>
    <title>康貝特 200P 期末衝刺場</title>
    <link rel="stylesheet" href="style.css?v=20260507-portrait-rotate" />
  </head>
  <body>
    <main class="page">
      <section class="game-shell">
        <canvas id="game" width="960" height="540" aria-label="Platform game ad"></canvas>
        <div
          id="touchControls"
          class="touch-controls"
          aria-hidden="true"
        >
          <div class="touch-controls__cluster touch-controls__cluster--move">
            <button type="button" class="touch-pad touch-pad--dir" data-touch="left" aria-label="向左移動">
              ◀
            </button>
            <button type="button" class="touch-pad touch-pad--dir" data-touch="right" aria-label="向右移動">
              ▶
            </button>
          </div>
          <div class="touch-controls__cluster touch-controls__cluster--action">
            <button type="button" class="touch-pad touch-pad--dash" data-touch="dash" aria-label="衝刺">
              衝
            </button>
            <button type="button" class="touch-pad touch-pad--jump" data-touch="jump" aria-label="跳躍">
              跳
            </button>
          </div>
        </div>
        <button id="skipButton" class="hud-button" type="button" aria-label="跳關">
          跳關
        </button>
        <button id="killBossButton" class="hud-button hud-button--danger" type="button" aria-label="秒殺Boss">
          秒殺Boss
        </button>
        <div id="cutsceneVideoOverlay" class="video-overlay" aria-hidden="true">
          <div class="video-overlay__stage">
            <video
              id="cutsceneVideo"
              class="video-overlay__player"
              playsinline
              preload="auto"
              src="assets/marketing/inserted-video.mp4"
            ></video>
          </div>
          <div id="cutsceneVideoHint" class="video-overlay__hint">影片播放中 · 點一下可略過</div>
        </div>
      </section>

      <div class="ui-hidden" aria-hidden="true">
        <span id="statusPill">按跳躍開始衝刺</span>
        <span id="coinsPill">200P 0 / 0</span>
        <span id="livesPill">精神值 5</span>
        <span id="timerPill">剩餘時間 78秒</span>
        <button id="restartButton" type="button">Restart</button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="game.js?v=20260507-portrait-rotate"></script>
  </body>
</html>
